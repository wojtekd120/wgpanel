services:
  wgpanel:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: wgpanel
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    volumes:
      - wgpanel-data:/var/lib/wgpanel
      - /etc/wireguard:/etc/wireguard:rw
    tmpfs:
      - /run/wgpanel:mode=0750
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${WGPANEL_PORT:-8080}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wgpanel-data:
